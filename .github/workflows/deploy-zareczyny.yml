name: Deploy Zareczyny to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/zareczyny/**"
      - "packages/**"
      - ".github/workflows/deploy-zareczyny.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Zareczyny to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Zareczyny
        run: npm run deploy:zareczyny
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
