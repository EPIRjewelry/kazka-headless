# Kazka Headless - Hydrogen na Cloudflare Workers
# Self-hosting (nie Oxygen), zgodnie z planem Professional

name = "hydrogen-kazka"
main = "dist/server/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "dist/client"
run_worker_first = true
binding = "ASSETS"

[vars]
# SESSION_SECRET - ustaw w Dashboard lub: wrangler secret put SESSION_SECRET
SESSION_SECRET = "foobar"
# NODE_ENV: development = zwraca error.stack w 500, production = generyczny komunikat
NODE_ENV = "development"
PUBLIC_STORE_DOMAIN = "epir-art-silver-jewellery.myshopify.com"
PUBLIC_CHECKOUT_DOMAIN = "checkout.shopify.com"
